<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Watcher</title>
<style>
  :root {
    --void: #07080d;
    --ash: #c7c4bb;
    --ember: #d4663a;
    --mist: rgba(199,196,187,0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--void); }
  body {
    font-family: ui-monospace, "SF Mono", "Roboto Mono", monospace;
    color: var(--ash);
  }
  #scene { position: fixed; inset: 0; display: block; }
  #cam {
    position: fixed; bottom: 16px; right: 16px;
    width: 180px; height: 135px; transform: scaleX(-1);
    border: 1px solid rgba(199,196,187,0.2);
    object-fit: cover; opacity: 0.32; z-index: 5;
    border-radius: 2px;
  }
  #hud {
    position: fixed; top: 18px; left: 20px; z-index: 10;
    font-size: 11px; letter-spacing: 0.18em; line-height: 1.9;
    text-transform: uppercase; pointer-events: none;
    text-shadow: 0 0 12px rgba(0,0,0,0.9);
  }
  #hud .ttl {
    font-size: 13px; color: var(--ash); letter-spacing: 0.32em;
    margin-bottom: 10px; font-weight: 700;
  }
  #hud .row { color: var(--mist); }
  #hud .dot { color: var(--ember); }
  #gate {
    position: fixed; inset: 0; z-index: 50;
    background: radial-gradient(circle at 50% 45%, #11131c 0%, var(--void) 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 26px; text-align: center; padding: 24px;
  }
  #gate h1 {
    font-size: clamp(28px, 7vw, 60px); font-weight: 700;
    letter-spacing: 0.42em; text-indent: 0.42em;
    color: var(--ash); line-height: 1;
  }
  #gate p {
    max-width: 440px; font-size: 12.5px; line-height: 2; letter-spacing: 0.06em;
    color: var(--mist); text-transform: none;
  }
  #gate p .e { color: var(--ember); }
  #enter {
    margin-top: 8px; background: none; cursor: pointer;
    border: 1px solid rgba(212,102,58,0.6); color: var(--ash);
    font-family: inherit; font-size: 12px; letter-spacing: 0.34em; text-indent: 0.34em;
    padding: 16px 38px; text-transform: uppercase; transition: all .35s ease;
  }
  #enter:hover { background: rgba(212,102,58,0.14); border-color: var(--ember); color: #fff; }
  #enter:focus-visible { outline: 2px solid var(--ember); outline-offset: 4px; }
  #status { font-size: 10.5px; letter-spacing: 0.2em; color: var(--mist); min-height: 14px; text-transform: uppercase; }
  .fade { opacity: 0 !important; pointer-events: none; transition: opacity 1s ease; }
  /* settings panel */
  #panel {
    position: fixed; top: 18px; right: 18px; z-index: 12;
    width: 210px; padding: 16px 16px 14px;
    max-height: calc(100vh - 36px); overflow-y: auto;
    background: rgba(20,28,38,0.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 10px;
    font-size: 11px; letter-spacing: 0.04em; color: #e8f1f8;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  #panel h2 {
    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(255,255,255,0.7); margin-bottom: 14px; font-weight: 700;
  }
  #panel .ctrl { margin-bottom: 13px; }
  #panel .ctrl:last-child { margin-bottom: 0; }
  #panel label { display: flex; justify-content: space-between; margin-bottom: 6px; }
  #panel label .val { color: #9fd0f2; font-variant-numeric: tabular-nums; }
  #panel input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 3px;
    background: rgba(255,255,255,0.18); border-radius: 3px; outline: none; cursor: pointer;
  }
  #panel input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: #cfe8ff; border: 2px solid #5a90c0; cursor: pointer;
  }
  #panel input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%; background: #cfe8ff; border: 2px solid #5a90c0; cursor: pointer;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<video id="cam" autoplay muted playsinline></video>
<div id="hud" class="fade">
  <div class="ttl">THE WATCHER</div>
  <div class="row">view <span class="dot">/</span> mortal</div>
  <div class="row">seen by <span class="dot">/</span> the world</div>
  <div class="row" id="trk">tracking <span class="dot">/</span> —</div>
</div>
<div id="panel" class="fade">
  <h2>The Watcher</h2>
  <div class="ctrl">
    <label>Size <span class="val" id="v_sz">2.00×</span></label>
    <input type="range" id="s_sz" min="0.6" max="4" step="0.05" value="2.0">
  </div>
  <div class="ctrl">
    <label>Face width <span class="val" id="v_fw">1.00×</span></label>
    <input type="range" id="s_fw" min="0.5" max="2.5" step="0.05" value="1.0">
  </div>
  <div class="ctrl">
    <label>Face height <span class="val" id="v_fh">1.00×</span></label>
    <input type="range" id="s_fh" min="0.5" max="2.5" step="0.05" value="1.0">
  </div>
  <div class="ctrl">
    <label>Position X <span class="val" id="v_px">0.0</span></label>
    <input type="range" id="s_px" min="-24" max="24" step="0.5" value="0">
  </div>
  <div class="ctrl">
    <label>Position Y <span class="val" id="v_py">0.0</span></label>
    <input type="range" id="s_py" min="-16" max="16" step="0.5" value="0">
  </div>
  <div class="ctrl">
    <label>Head tilt <span class="val" id="v_tl">0°</span></label>
    <input type="range" id="s_tl" min="-45" max="45" step="1" value="0">
  </div>
  <div class="ctrl">
    <label>Zoom <span class="val" id="v_zm">1.10×</span></label>
    <input type="range" id="s_zm" min="0.6" max="3.5" step="0.05" value="1.10">
  </div>
  <div class="ctrl">
    <label>Smoothness <span class="val" id="v_sm">0.65</span></label>
    <input type="range" id="s_sm" min="0" max="0.95" step="0.05" value="0.65">
  </div>
  <div class="ctrl">
    <label>Face opacity <span class="val" id="v_fo">0.32</span></label>
    <input type="range" id="s_fo" min="0.03" max="1" step="0.01" value="0.32">
  </div>
  <div class="ctrl">
    <label>Hand opacity <span class="val" id="v_ho">0.40</span></label>
    <input type="range" id="s_ho" min="0.03" max="1" step="0.01" value="0.40">
  </div>
  <div class="ctrl">
    <label>Clouds <span class="val" id="v_co">1.00</span></label>
    <input type="range" id="s_co" min="0" max="1" step="0.05" value="1.0">
  </div>
</div>
<div id="gate">
  <h1>WATCHER</h1>
  <p>To you, the sky is just the sky.<br>
  But to anything looking up from <span class="e">inside</span> the world — a vast face among the clouds, and two hands reaching down from the blue.</p>
  <button id="enter">Open the eye</button>
  <div id="status"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { FaceLandmarker, HandLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs';

const VOID = 0x07080d, EMBER = 0xd4663a, ASH = 0xc7c4bb;

// ---------- RUNTIME SETTINGS (driven by the on-screen sliders) ----------
const settings = {
  faceSize:    2.0,    // overall scale of the face — HUGE / godlike by default
  faceWidth:   1.0,    // horizontal stretch (1 = natural)
  faceHeight:  1.0,    // vertical stretch (1 = natural)
  posX:        0.0,    // horizontal position offset of the face, world units
  posY:        0.0,    // vertical position offset of the face, world units
  tilt:        0.0,    // head pitch in degrees (+ tilts the face to look DOWN)
  faceOpacity: 0.32,   // face voxel opacity — wispy / ethereal by default
  handOpacity: 0.40,   // hand voxel opacity
  smooth:      0.65,   // temporal smoothing (0 = raw/snappy, ~1 = glassy smooth)
  zoom:        1.10,   // camera magnification (larger = zoomed in)
  cloudOpacity: 1.0,   // overall cloud visibility multiplier
};

// ---------- THREE SETUP ----------
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();

// ---------- SKY ----------
// Soft blue gradient sky on a large back-facing sphere (shader-based vertical blend).
const SKY_TOP = new THREE.Color(0x4a90d9);     // deeper blue up high
const SKY_BOT = new THREE.Color(0xbfe3f5);     // pale near the horizon
scene.background = SKY_BOT.clone();            // fallback flat color
const skyGeo = new THREE.SphereGeometry(400, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite: false,
  uniforms: { top:{value:SKY_TOP}, bot:{value:SKY_BOT} },
  vertexShader: `varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `varying vec3 vP; uniform vec3 top; uniform vec3 bot;
    void main(){ float h=clamp((normalize(vP).y*0.5+0.5),0.0,1.0); gl_FragColor=vec4(mix(bot,top,pow(h,0.7)),1.0); }`
});
scene.add(new THREE.Mesh(skyGeo, skyMat));
scene.fog = new THREE.Fog(SKY_BOT.getHex(), 60, 320);

// ---------- WISPY CLOUDS ----------
// Soft circular sprites drifting slowly across the sky behind the watcher.
const cloudTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64,64,0, 64,64,64);
  g.addColorStop(0, 'rgba(255,255,255,0.9)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.5)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  x.fillStyle = g; x.fillRect(0,0,128,128);
  const t = new THREE.CanvasTexture(c); return t;
})();
const clouds = [];
const cloudGroup = new THREE.Group();
scene.add(cloudGroup);
for (let i = 0; i < 26; i++) {
  const m = new THREE.Sprite(new THREE.SpriteMaterial({
    map: cloudTex, transparent: true, opacity: 0.18 + Math.random()*0.22,
    depthWrite: false, fog: false
  }));
  m.userData.baseOpacity = m.material.opacity;     // for the cloud-opacity slider
  const s = 30 + Math.random()*60;
  m.scale.set(s, s*0.55, 1);
  m.position.set((Math.random()-0.5)*360, 6 + Math.random()*70, -120 - Math.random()*180);
  m.userData.speed = 0.6 + Math.random()*1.4;     // drift speed
  cloudGroup.add(m); clouds.push(m);
}

// The MORTAL camera — first-person, peering up at the watcher.
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 600);
camera.position.set(0, 4.0, 14);
camera.zoom = settings.zoom;
camera.lookAt(0, 13, -30);
camera.updateProjectionMatrix();

// ---------- LIGHTING ----------
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x8aa0b0, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.1);
key.position.set(6, 24, 14); key.castShadow = false;   // no ground left to catch shadows
scene.add(key);

// soft front-fill aimed at the watcher so the video-colored face/hands are
// clearly lit from the viewer's side — replaces the old self-glow
const faceFill = new THREE.DirectionalLight(0xffffff, 1.15);
faceFill.position.set(0, 14, 10);     // in front of and above the face
faceFill.target.position.set(0, 13, -30);
scene.add(faceFill);
scene.add(faceFill.target);

// ---------- THE WATCHER (face + hands), at the far edge facing INWARD ----------
// Lives in a group sitting at the back of the world, looking toward the mortal camera.
const watcher = new THREE.Group();
const WATCHER_BASE_Y = 13;           // anchor height the face hovers around (Position Y offsets from here)
watcher.position.set(0, WATCHER_BASE_Y, -30);
scene.add(watcher);

// Face lives in its own sub-group so size / width / height / position can be
// adjusted live (and smoothly) via a transform — no voxel rebuild required.
const faceGroup = new THREE.Group();
watcher.add(faceGroup);

const _q = new THREE.Quaternion();
const _s = new THREE.Vector3();
const _v = new THREE.Vector3();
const _up = new THREE.Vector3(0,1,0);

//  triangle interior densely (step count scales with edge length
//  / cell size) so the surface has NO holes at any resolution.
//  Each (x,y) column is then scan-filled back-to-front into a

// per-column: key "gx,gy" -> [minGz, maxGz, gx, gy]. Pure shell — no color is sampled.
const faceCols = new Map();
function faceAddColumn(x, y, z) {
  const gx = Math.round(x / FACE_CELL);
  const gy = Math.round(y / FACE_CELL);
  const gz = Math.round(z / FACE_CELL);
  const key = gx + ',' + gy;
  let c = faceCols.get(key);
  if (!c) { faceCols.set(key, [gz, gz, gx, gy]); }
  else {
    if (gz < c[0]) c[0] = gz;
    if (gz > c[1]) c[1] = gz;
  }
}

function rebuildFaceVoxels(lm) {
  faceCols.clear();
  // pass 1: transform the 468 landmarks (u,v = their normalized image coords).
  // Size / width / height / position are applied live via faceGroup's transform,
  // so the voxel grid built here stays square & seamless at any size.
  for (let i = 0; i < FACE_PTS; i++) {
    const x = -(lm[i].x - 0.5) * FACE_SCALE;          // mirror X
    const y = -(lm[i].y - 0.5) * FACE_SCALE;
    const z = -lm[i].z * FACE_SCALE * 1.6;            // exaggerate depth for volume
    faceLandmarks[i*3]=x; faceLandmarks[i*3+1]=y; faceLandmarks[i*3+2]=z;
    faceAddColumn(x, y, z);
  }
  // pass 2: barycentric-fill every triangle interior (gap-free shell surface)
  const F = faceLandmarks;
  for (let t = 0; t < FACE_TRIS.length; t += 3) {
    const A=FACE_TRIS[t], B=FACE_TRIS[t+1], C=FACE_TRIS[t+2];
    const ia=A*3, ib=B*3, ic=C*3;
    const ax=F[ia],ay=F[ia+1],az=F[ia+2];
    const bx=F[ib],by=F[ib+1],bz=F[ib+2];
    const cx=F[ic],cy=F[ic+1],cz=F[ic+2];
    const eMax = Math.max(
      Math.hypot(bx-ax,by-ay,bz-az),
      Math.hypot(cx-ax,cy-ay,cz-az),
      Math.hypot(cx-bx,cy-by,cz-bz));
    const N = Math.max(1, Math.ceil(eMax / FACE_CELL));
    const inv = 1/N;
    for (let i=0;i<=N;i++){
      for (let j=0;j<=N-i;j++){
        const u=i*inv, w=j*inv;
        faceAddColumn(ax+(bx-ax)*u+(cx-ax)*w,
                      ay+(by-ay)*u+(cy-ay)*w,
                      az+(bz-az)*u+(cz-az)*w);
      }
    }
  }
  // pass 3: fill a thin shell BEHIND the front surface (maxGz). Every voxel is
  // pure white; the scene lighting + translucency give it sculpted shell form.
  const shellCells = Math.max(2, Math.round(FACE_SHELL / FACE_CELL));
  let count = 0;
  for (const [, c] of faceCols) {
    const minGz = c[0], maxGz = c[1], gx = c[2], gy = c[3];
    const span = maxGz - minGz;
    const depth = Math.min(span, shellCells);     // how far back from the front we fill
    for (let d = 0; d <= depth; d++) {
      if (count >= FACE_MAX_CUBES) break;
      const gz = maxGz - d;                        // start at front, recede
      _m.makeTranslation(gx * FACE_CELL, gy * FACE_CELL, gz * FACE_CELL);
      faceVox.setMatrixAt(count, _m);
      faceVox.instanceColor.setXYZ(count, 1, 1, 1); // base color white for all
      count++;
    }
    if (count >= FACE_MAX_CUBES) break;
  }
  faceVox.count = count;
  faceVox.instanceMatrix.needsUpdate = true;
  faceVox.instanceColor.needsUpdate = true;
}

  for (const key of handCells.keys()) {
    if (c >= MAX_BONE_CUBES) break;
    const [gx,gy,gz] = key.split(',');
    _m.makeTranslation(gx*HAND_CELL, gy*HAND_CELL, gz*HAND_CELL);
    hand.bones.setMatrixAt(c++, _m);
  }
  hand.bones.count = c;
  hand.bones.instanceMatrix.needsUpdate = true;
}

// ---------- MEDIAPIPE ----------
const video = document.getElementById('cam');
let faceLM = null, handLM = null;
const statusEl = document.getElementById('status');
const trkEl = document.getElementById('trk');

// The webcam still drives FACE + HAND tracking, but its pixels are never
// painted onto the voxels — the watcher is a plain white shell of your shape.

async function initVision() {
  statusEl.textContent = 'summoning models…';
  const fileset = await FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm');
  faceLM = await FaceLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath:
      'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU' },
    runningMode: 'VIDEO', numFaces: 1
  });

  handLM = await HandLandmarker.createFromOptions(fileset, {
    baseOptions: { modelAssetPath:
      'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
      delegate: 'GPU' },
    runningMode: 'VIDEO', numHands: 2
  });
  statusEl.textContent = 'requesting the eye…';
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { width: 640, height: 480, facingMode: 'user' }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
}

let faceTracked = false;
let faceSmooth = null;     // EMA-smoothed copy of the face landmarks (super-smooth motion)

// local-space joint buffer reused per hand per frame
const _localJoints = Array.from({length: HAND_PTS}, () => new THREE.Vector3());

function processVideo(now) {
  if (!faceLM || video.readyState < 2) return;

  // FACE -> voxels (temporally smoothed so motion glides instead of jittering)
  const f = faceLM.detectForVideo(video, now);
  if (f.faceLandmarks && f.faceLandmarks.length) {
    const raw = f.faceLandmarks[0];
    const a = Math.max(0.04, 1 - settings.smooth);   // EMA factor (lower = smoother)
    if (!faceSmooth || faceSmooth.length !== raw.length) {
      faceSmooth = raw.map(p => ({ x: p.x, y: p.y, z: p.z }));
    } else {
      for (let i = 0; i < raw.length; i++) {
        const s = faceSmooth[i], r = raw[i];
        s.x += (r.x - s.x) * a; s.y += (r.y - s.y) * a; s.z += (r.z - s.z) * a;
      }
    }
    rebuildFaceVoxels(faceSmooth);
    faceTracked = true;
  } else { faceTracked = false; faceSmooth = null; faceVox.count = 0; faceVox.instanceMatrix.needsUpdate = true; }

  // HANDS -> voxel bones + fingertip pushers
  const h = handLM.detectForVideo(video, now);
  const n = h.landmarks ? h.landmarks.length : 0;
  for (let hi = 0; hi < hands.length; hi++) {
    const hand = hands[hi];
    if (hi < n) {
      const fresh = !hand.present;                    // first frame this hand re-appears
      const raw = h.landmarks[hi];
      // temporally smooth the hand landmarks too (matches the face)
      const a = Math.max(0.04, 1 - settings.smooth);
      if (!hand.smooth || hand.smooth.length !== raw.length) {
        hand.smooth = raw.map(p => ({ x: p.x, y: p.y, z: p.z }));
      } else {
        for (let i = 0; i < raw.length; i++) {
          const s = hand.smooth[i], r = raw[i];
          s.x += (r.x - s.x) * a; s.y += (r.y - s.y) * a; s.z += (r.z - s.z) * a;
        }
      }
      const lm = hand.smooth;
      // hand centre -> eased target (snapped on first appearance so it doesn't slide in)
      let cx=0, cy=0; for (const p of lm){ cx+=p.x; cy+=p.y; } cx/=21; cy/=21;
      hand.targetPos.set((cx-0.5)*-30, HAND_Y + (0.5-cy)*16, HAND_Z);
      if (fresh) hand.group.position.copy(hand.targetPos);

      // local joint positions (mirror X, exaggerate depth)
      for (let i=0;i<HAND_PTS;i++){
        _localJoints[i].set(
          -(lm[i].x-0.5)*HAND_SCALE,
          -(lm[i].y-0.5)*HAND_SCALE,
          -lm[i].z*HAND_SCALE*1.4
        );
      }
      rebuildHandVoxels(hand, _localJoints);

      // fingertip pusher cubes -> local, and cache WORLD pos for physics
      TIP_IDX.forEach((ti, k) => {
        const t = hand.tips[k];
        t.position.copy(_localJoints[ti]);
        hand.joints[k].copy(_localJoints[ti]).add(hand.group.position); // world
      });
      hand.group.visible = true; hand.present = true;
    } else { hand.group.visible = false; hand.present = false; hand.smooth = null; }
  }

  const fp = faceTracked ? 'face' : '—';
  const hp = n > 0 ? `${n} hand${n>1?'s':''}` : '';
  trkEl.innerHTML = `tracking <span class="dot">/</span> ${[fp, hp].filter(Boolean).join(' + ') || '—'}`;
}

// ---------- LOOP ----------
const clock = new THREE.Clock();
let running = false;
let lastTrack = 0;
const TRACK_INTERVAL = 1000 / 30;     // re-voxelize at ~30fps; render stays at 60
function loop() {
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime();
  const now = performance.now();
  // tracking + voxel rebuild is the heavy work — run it at a capped rate,
  // independent of the render framerate so the scene stays smooth at hi-res
  if (running && now - lastTrack >= TRACK_INTERVAL) {
    lastTrack = now;
    processVideo(now);
  }

  // apply live settings (cheap, every frame so sliders feel instant)
  faceVoxMat.opacity = settings.faceOpacity;
  // hands stay pure white (shell), only opacity is live-adjustable
  for (const hand of hands) {
    hand.bones.material.opacity = settings.handOpacity;
    // ease the hand group toward its tracked target for buttery motion
    if (hand.present) hand.group.position.lerp(hand.targetPos, 0.35);
  }
  for (const c of clouds) c.material.opacity = c.userData.baseOpacity * settings.cloudOpacity;

  // face size / shape / position — applied live via the faceGroup transform.
  // No voxel rebuild needed, so dragging these sliders stays perfectly smooth.
  faceGroup.scale.set(
    settings.faceSize * settings.faceWidth,
    settings.faceSize * settings.faceHeight,
    settings.faceSize
  );
  faceGroup.position.set(settings.posX, settings.posY, 0);
  faceGroup.rotation.x = settings.tilt * Math.PI / 180;   // pitch: + looks down, - looks up

  // drift the clouds slowly across the sky; wrap around when they exit
  for (const c of clouds) {
    c.position.x += c.userData.speed * 0.02;
    if (c.position.x > 200) c.position.x = -200;
  }

  // mortal camera — keep the face centered by aiming at the watcher itself.
  // Height moves the face up/down on screen; zoom is true camera magnification.
  const aimY = WATCHER_BASE_Y;
  camera.position.x = Math.sin(t*0.18)*0.18;
  camera.position.y = 4.0 + Math.sin(t*0.27)*0.08;
  camera.position.z = 14;
  camera.zoom = settings.zoom;
  camera.lookAt(0, aimY, watcher.position.z);
  camera.updateProjectionMatrix();

  renderer.render(scene, camera);
}
loop();

// ---------- SETTINGS WIRING ----------
function bindSlider(id, valId, fmt, apply) {
  const s = document.getElementById(id), v = document.getElementById(valId);
  const update = () => { const x = parseFloat(s.value); apply(x); v.textContent = fmt(x); };
  s.addEventListener('input', update); update();
}
bindSlider('s_sz', 'v_sz', x => x.toFixed(2)+'×', x => settings.faceSize = x);
bindSlider('s_fw', 'v_fw', x => x.toFixed(2)+'×', x => settings.faceWidth = x);
bindSlider('s_fh', 'v_fh', x => x.toFixed(2)+'×', x => settings.faceHeight = x);
bindSlider('s_px', 'v_px', x => x.toFixed(1),     x => settings.posX = x);
bindSlider('s_py', 'v_py', x => x.toFixed(1),     x => settings.posY = x);
bindSlider('s_tl', 'v_tl', x => x.toFixed(0)+'°', x => settings.tilt = x);
bindSlider('s_zm', 'v_zm', x => x.toFixed(2)+'×', x => settings.zoom = x);
bindSlider('s_sm', 'v_sm', x => x.toFixed(2),     x => settings.smooth = x);
bindSlider('s_fo', 'v_fo', x => x.toFixed(2),     x => settings.faceOpacity = x);
bindSlider('s_ho', 'v_ho', x => x.toFixed(2),     x => settings.handOpacity = x);
bindSlider('s_co', 'v_co', x => x.toFixed(2),     x => settings.cloudOpacity = x);

// ---------- ENTER ----------
document.getElementById('enter').addEventListener('click', async () => {
  const gate = document.getElementById('gate');
  const btn = document.getElementById('enter');
  btn.disabled = true;
  try {
    await initVision();
    running = true;
    gate.classList.add('fade');
    document.getElementById('hud').classList.remove('fade');
    document.getElementById('panel').classList.remove('fade');
    setTimeout(() => gate.remove(), 1100);
  } catch (e) {
    console.error('WATCHER INIT FAILED:', e);
    btn.disabled = false;
    btn.textContent = 'enter world anyway';
    const reason = e.name === 'NotAllowedError' ? 'camera permission denied'
      : e.name === 'NotFoundError' ? 'no camera found'
      : (e.message || e.toString() || 'unknown error');
    statusEl.innerHTML = 'failed: ' + reason + '<br><span style="opacity:.6">(click again to enter without tracking)</span>';
    // second click: enter the world with no tracking, so the scene is still visible
    btn.onclick = () => {
      running = false;
      gate.classList.add('fade');
      document.getElementById('hud').classList.remove('fade');
      document.getElementById('panel').classList.remove('fade');
      setTimeout(() => gate.remove(), 1100);
    };
  }
});

// surface uncaught errors on screen too
addEventListener('error', e => {
  if (statusEl) statusEl.innerHTML = 'script error: ' + (e.message || 'see console');
});
addEventListener('unhandledrejection', e => {
  if (statusEl) statusEl.innerHTML = 'load error: ' + (e.reason?.message || e.reason || 'see console');
});

addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
